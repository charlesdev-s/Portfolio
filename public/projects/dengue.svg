<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <radialGradient id="bg-glow2" cx="70%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-grad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="area-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dotgrid2" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#1e1e2e"/>
    </pattern>
    <filter id="dot-glow"><feGaussianBlur stdDeviation="2.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="675" fill="#0a0a0f"/>
  <rect width="1200" height="675" fill="url(#dotgrid2)"/>
  <rect width="1200" height="675" fill="url(#bg-glow2)"/>

  <!-- Chart area -->
  <g transform="translate(120 200)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="320" stroke="#2a2a3a" stroke-width="2"/>
    <line x1="0" y1="320" x2="960" y2="320" stroke="#2a2a3a" stroke-width="2"/>

    <!-- Gridlines -->
    <g stroke="#1e1e2e" stroke-width="1" stroke-dasharray="3 6">
      <line x1="0" y1="80" x2="960" y2="80"/>
      <line x1="0" y1="160" x2="960" y2="160"/>
      <line x1="0" y1="240" x2="960" y2="240"/>
    </g>

    <!-- Area under curve -->
    <path d="M 0 280 L 80 250 L 180 230 L 260 200 L 340 180 L 440 150 L 540 110 L 640 90 L 740 70 L 840 50 L 960 30 L 960 320 L 0 320 Z"
          fill="url(#area-grad)"/>

    <!-- Trend / regression line -->
    <path d="M 0 280 L 80 250 L 180 230 L 260 200 L 340 180 L 440 150 L 540 110 L 640 90 L 740 70 L 840 50 L 960 30"
          fill="none" stroke="url(#line-grad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Data points -->
    <g fill="#5eead4" filter="url(#dot-glow)">
      <circle cx="40" cy="290" r="5"/>
      <circle cx="120" cy="260" r="5"/>
      <circle cx="220" cy="245" r="5"/>
      <circle cx="300" cy="210" r="5"/>
      <circle cx="400" cy="170" r="5"/>
      <circle cx="500" cy="130" r="5"/>
      <circle cx="600" cy="105" r="5"/>
      <circle cx="700" cy="85" r="5"/>
      <circle cx="800" cy="60" r="5"/>
      <circle cx="900" cy="40" r="5"/>
    </g>

    <!-- Scatter (off-trend) -->
    <g fill="#8888a0" opacity="0.55">
      <circle cx="60" cy="270" r="3"/>
      <circle cx="160" cy="270" r="3"/>
      <circle cx="280" cy="240" r="3"/>
      <circle cx="360" cy="190" r="3"/>
      <circle cx="480" cy="170" r="3"/>
      <circle cx="560" cy="140" r="3"/>
      <circle cx="660" cy="120" r="3"/>
      <circle cx="780" cy="80" r="3"/>
      <circle cx="860" cy="55" r="3"/>
    </g>

    <!-- Axis labels -->
    <g font-family="Inter, sans-serif" fill="#55556a" font-size="13">
      <text x="0" y="345" text-anchor="middle">0</text>
      <text x="240" y="345" text-anchor="middle">50</text>
      <text x="480" y="345" text-anchor="middle">70</text>
      <text x="720" y="345" text-anchor="middle">85</text>
      <text x="960" y="345" text-anchor="middle">100</text>
      <text x="-12" y="324" text-anchor="end">0</text>
      <text x="-12" y="244" text-anchor="end">100</text>
      <text x="-12" y="164" text-anchor="end">200</text>
      <text x="-12" y="84" text-anchor="end">300</text>
    </g>

    <text x="480" y="380" text-anchor="middle" font-family="Space Grotesk, sans-serif"
          fill="#8888a0" font-size="14" font-weight="500">Relative Humidity (%)</text>
    <text x="-60" y="160" text-anchor="middle" font-family="Space Grotesk, sans-serif"
          fill="#8888a0" font-size="14" font-weight="500"
          transform="rotate(-90 -60 160)">Dengue Cases</text>
  </g>

  <!-- Label -->
  <g font-family="Space Grotesk, Inter, sans-serif" fill="#f0f0f0">
    <text x="60" y="92" font-size="36" font-weight="700">Climatic Factors &amp; Dengue Incidence</text>
    <text x="60" y="128" font-size="18" font-weight="500" fill="#8888a0">
      Mathematical Modeling · R · Jamovi
    </text>
  </g>

  <!-- Key callout -->
  <g transform="translate(900 92)">
    <rect x="0" y="0" width="200" height="46" rx="23" fill="#5eead4" opacity="0.12" stroke="#5eead4" stroke-width="1"/>
    <text x="100" y="29" text-anchor="middle" font-family="Space Grotesk, sans-serif"
          fill="#5eead4" font-size="14" font-weight="600" letter-spacing="1.5">NEG BINOMIAL REG</text>
  </g>
</svg>
