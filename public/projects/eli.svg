<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="60%" stop-color="#10141f"/>
      <stop offset="100%" stop-color="#13131a"/>
    </linearGradient>
    <radialGradient id="moon-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="platform-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#0e0e16"/>
    </linearGradient>
    <linearGradient id="char-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7df3e1"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <filter id="char-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="675" fill="url(#sky-grad)"/>

  <!-- Moon glow + moon -->
  <circle cx="960" cy="170" r="180" fill="url(#moon-glow)"/>
  <circle cx="960" cy="170" r="56" fill="#13131a" stroke="#5eead4" stroke-width="2" opacity="0.9"/>
  <circle cx="940" cy="155" r="8" fill="#1e1e2e"/>
  <circle cx="975" cy="185" r="5" fill="#1e1e2e"/>
  <circle cx="950" cy="195" r="4" fill="#1e1e2e"/>

  <!-- Stars -->
  <g fill="#5eead4">
    <circle cx="120" cy="100" r="2"/>
    <circle cx="260" cy="60" r="1.5"/>
    <circle cx="380" cy="140" r="2"/>
    <circle cx="520" cy="80" r="1.5"/>
    <circle cx="680" cy="120" r="2"/>
    <circle cx="820" cy="60" r="1.5"/>
    <circle cx="1100" cy="100" r="2"/>
    <circle cx="180" cy="220" r="1.5"/>
    <circle cx="450" cy="200" r="1.5"/>
    <circle cx="730" cy="240" r="2"/>
    <circle cx="1050" cy="280" r="1.5"/>
  </g>

  <!-- Distant mountains -->
  <path d="M 0 480 L 120 380 L 220 440 L 320 360 L 440 430 L 540 370 L 680 440 L 800 380 L 940 430 L 1080 360 L 1200 420 L 1200 675 L 0 675 Z"
        fill="#10141f" opacity="0.8"/>

  <!-- Floating platforms -->
  <g>
    <!-- Platform 1 - low left -->
    <rect x="80" y="530" width="220" height="40" rx="6" fill="url(#platform-grad)" stroke="#2a2a3a" stroke-width="1.5"/>
    <rect x="80" y="530" width="220" height="6" fill="#5eead4" opacity="0.6"/>

    <!-- Platform 2 - mid -->
    <rect x="380" y="440" width="180" height="36" rx="6" fill="url(#platform-grad)" stroke="#2a2a3a" stroke-width="1.5"/>
    <rect x="380" y="440" width="180" height="5" fill="#5eead4" opacity="0.6"/>

    <!-- Platform 3 - high -->
    <rect x="620" y="350" width="150" height="32" rx="6" fill="url(#platform-grad)" stroke="#2a2a3a" stroke-width="1.5"/>
    <rect x="620" y="350" width="150" height="5" fill="#5eead4" opacity="0.6"/>

    <!-- Platform 4 - top right -->
    <rect x="840" y="280" width="220" height="32" rx="6" fill="url(#platform-grad)" stroke="#2a2a3a" stroke-width="1.5"/>
    <rect x="840" y="280" width="220" height="5" fill="#5eead4" opacity="0.6"/>
  </g>

  <!-- Coins -->
  <g fill="#5eead4" opacity="0.85">
    <circle cx="470" cy="410" r="8"/>
    <circle cx="695" cy="320" r="8"/>
    <circle cx="950" cy="250" r="8"/>
  </g>
  <g fill="#0a0a0f">
    <circle cx="470" cy="410" r="3"/>
    <circle cx="695" cy="320" r="3"/>
    <circle cx="950" cy="250" r="3"/>
  </g>

  <!-- Character (Eli) - simple cute shape on platform 2 -->
  <g transform="translate(450 380)" filter="url(#char-glow)">
    <!-- body -->
    <rect x="-20" y="0" width="40" height="46" rx="14" fill="url(#char-grad)"/>
    <!-- head -->
    <circle cx="0" cy="-14" r="22" fill="url(#char-grad)"/>
    <!-- eyes -->
    <circle cx="-7" cy="-16" r="3.5" fill="#0a0a0f"/>
    <circle cx="7" cy="-16" r="3.5" fill="#0a0a0f"/>
    <!-- eye highlights -->
    <circle cx="-6" cy="-17" r="1.2" fill="#f0f0f0"/>
    <circle cx="8" cy="-17" r="1.2" fill="#f0f0f0"/>
    <!-- smile -->
    <path d="M -6 -8 Q 0 -3 6 -8" stroke="#0a0a0f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- legs -->
    <rect x="-14" y="44" width="10" height="14" rx="3" fill="#5eead4"/>
    <rect x="4" y="44" width="10" height="14" rx="3" fill="#5eead4"/>
  </g>

  <!-- Dash trail behind character -->
  <g fill="#5eead4">
    <circle cx="410" cy="395" r="3" opacity="0.5"/>
    <circle cx="385" cy="400" r="2.5" opacity="0.35"/>
    <circle cx="365" cy="405" r="2" opacity="0.2"/>
  </g>

  <!-- Label -->
  <g font-family="Space Grotesk, Inter, sans-serif" fill="#f0f0f0">
    <text x="60" y="92" font-size="36" font-weight="700">Eli</text>
    <text x="60" y="128" font-size="18" font-weight="500" fill="#8888a0">
      2D Platformer · Unity · C# · Krita
    </text>
  </g>
</svg>
