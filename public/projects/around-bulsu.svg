<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#5eead4" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phone-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#0e0e16"/>
    </linearGradient>
    <linearGradient id="path-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="pin-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#1e1e2e"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#0a0a0f"/>
  <rect width="1200" height="675" fill="url(#dotgrid)"/>
  <rect width="1200" height="675" fill="url(#bg-glow)"/>

  <!-- Abstract building silhouettes -->
  <g opacity="0.35" fill="#13131a" stroke="#1e1e2e" stroke-width="1.5">
    <rect x="60" y="380" width="120" height="220"/>
    <rect x="200" y="320" width="90" height="280"/>
    <rect x="305" y="420" width="70" height="180"/>
    <rect x="900" y="350" width="100" height="250"/>
    <rect x="1020" y="400" width="140" height="200"/>
  </g>

  <!-- Curved AR path -->
  <path d="M 240 540 Q 460 460 600 410 T 960 220"
        fill="none" stroke="url(#path-grad)" stroke-width="6"
        stroke-linecap="round" stroke-dasharray="2 18" opacity="0.95"/>

  <!-- Destination pin (large) -->
  <g transform="translate(960 220)" filter="url(#pin-glow)">
    <path d="M 0 -40 C -22 -40 -40 -22 -40 0 C -40 26 0 60 0 60 C 0 60 40 26 40 0 C 40 -22 22 -40 0 -40 Z"
          fill="#5eead4"/>
    <circle cx="0" cy="-4" r="12" fill="#0a0a0f"/>
  </g>

  <!-- Origin pulse -->
  <g transform="translate(240 540)">
    <circle r="42" fill="#5eead4" opacity="0.08"/>
    <circle r="22" fill="#5eead4" opacity="0.18"/>
    <circle r="9" fill="#5eead4"/>
  </g>

  <!-- Center phone frame -->
  <g transform="translate(540 130)">
    <rect x="0" y="0" width="220" height="420" rx="28"
          fill="url(#phone-grad)" stroke="#5eead4" stroke-width="2" opacity="0.95"/>
    <rect x="14" y="14" width="192" height="392" rx="18"
          fill="#0a0a0f"/>
    <!-- inner AR view -->
    <path d="M 30 380 L 110 220 L 190 380 Z" fill="#5eead4" opacity="0.10"/>
    <path d="M 30 380 L 110 220 L 190 380" fill="none" stroke="#5eead4" stroke-width="2" opacity="0.8"/>
    <circle cx="110" cy="220" r="14" fill="#5eead4"/>
    <circle cx="110" cy="220" r="6" fill="#0a0a0f"/>
    <!-- mini reticle -->
    <g stroke="#5eead4" stroke-width="1.5" fill="none" opacity="0.6">
      <circle cx="110" cy="320" r="28"/>
      <line x1="78" y1="320" x2="98" y2="320"/>
      <line x1="122" y1="320" x2="142" y2="320"/>
      <line x1="110" y1="288" x2="110" y2="308"/>
      <line x1="110" y1="332" x2="110" y2="352"/>
    </g>
  </g>

  <!-- Label -->
  <g font-family="Space Grotesk, Inter, sans-serif" fill="#f0f0f0">
    <text x="60" y="92" font-size="36" font-weight="700">ARound BulSU</text>
    <text x="60" y="126" font-size="18" font-weight="500" fill="#8888a0">
      AR Campus Navigation
    </text>
  </g>
  <g font-family="Inter, sans-serif" fill="#5eead4">
    <text x="60" y="620" font-size="14" font-weight="600" letter-spacing="2">UNITY · ARCORE/ARKIT · C#</text>
  </g>
</svg>
